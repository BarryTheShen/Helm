[project]
name = "keel-server"
version = "0.1.0"
description = "FastAPI helpers, MCP tools, WebSocket manager, and SDUI normalization for Keel AI-UI framework"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "fastapi>=0.115",

    "mcp>=1.6",
    "loguru>=0.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
]

[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["keel_server*"]
