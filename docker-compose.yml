services:
  backend:
    build: ./backend
    container_name: helm-backend
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/helm.db
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      CORS_ALLOW_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5174,http://localhost:8080"
      SESSION_IDLE_TIMEOUT_HOURS: "168"
    volumes:
      - helm-data:/app/data
    ports:
      - "9100:9100"
    restart: unless-stopped

  web:
    build: ./web
    container_name: helm-web
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  helm-data:
