<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helm Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3244;
      --text: #e2e8f0;
      --text-muted: #8892aa;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --user-bg: #1e3a5f;
      --assistant-bg: #1a1d27;
      --error: #f87171;
      --thinking: #a78bfa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    header .model-badge {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
    }

    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-role {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 100%;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid #2a4a7f;
    }

    .msg.assistant .msg-bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
    }

    .msg.error .msg-bubble {
      background: #2d1515;
      border: 1px solid #7f2a2a;
      color: var(--error);
    }

    .thinking-block {
      font-size: 12px;
      color: var(--thinking);
      background: #1a1530;
      border: 1px solid #3a2a6a;
      border-radius: 8px;
      padding: 6px 12px;
      margin-bottom: 8px;
      max-width: 100%;
      word-break: break-word;
    }

    .thinking-block summary.thinking-label {
      font-style: normal;
      font-weight: 600;
      color: #c4a8ff;
      cursor: pointer;
      list-style: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .thinking-block summary::-webkit-details-marker { display: none; }

    .thinking-block summary::before {
      content: '▶';
      font-size: 9px;
      transition: transform 0.15s;
    }

    .thinking-block[open] summary::before { transform: rotate(90deg); }

    .thinking-text {
      display: block;
      font-style: italic;
      font-size: 11.5px;
      color: #a78bfa;
      padding: 6px 0 2px;
      white-space: pre-wrap;
    }

    /* Rendered markdown styles inside assistant bubbles */
    .msg.assistant .msg-bubble h1,
    .msg.assistant .msg-bubble h2,
    .msg.assistant .msg-bubble h3 {
      margin: 10px 0 4px;
      font-weight: 600;
      color: var(--text);
    }
    .msg.assistant .msg-bubble h1 { font-size: 16px; }
    .msg.assistant .msg-bubble h2 { font-size: 14px; }
    .msg.assistant .msg-bubble h3 { font-size: 13px; }
    .msg.assistant .msg-bubble p { margin: 4px 0; }
    .msg.assistant .msg-bubble ul,
    .msg.assistant .msg-bubble ol {
      margin: 4px 0 4px 20px;
    }
    .msg.assistant .msg-bubble li { margin: 2px 0; }
    .msg.assistant .msg-bubble strong { color: var(--text); }
    .msg.assistant .msg-bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0;
    }
    .msg.assistant .msg-bubble code {
      font-family: "SF Mono", monospace;
      font-size: 12px;
      background: #22263a;
      padding: 1px 4px;
      border-radius: 3px;
    }

    .tool-block {
      font-size: 12px;
      background: #0d1f1a;
      border: 1px solid #1a4a3a;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 8px;
      max-width: 100%;
    }

    .tool-block summary {
      cursor: pointer;
      font-weight: 600;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 6px;
      list-style: none;
      user-select: none;
    }

    .tool-block summary::-webkit-details-marker { display: none; }

    .tool-block summary::before {
      content: '▶';
      font-size: 10px;
      transition: transform 0.15s;
    }

    .tool-block[open] summary::before { transform: rotate(90deg); }

    .tool-name { color: #86efac; }
    .tool-status { font-size: 11px; color: #6b7280; margin-left: auto; }
    .tool-status.done { color: #4ade80; }
    .tool-status.error { color: #f87171; }

    .tool-body {
      margin-top: 8px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    .tool-result {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #1a4a3a;
      color: #64748b;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 150px;
      overflow-y: auto;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--accent);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .status-bar {
      height: 2px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .status-bar.streaming {
      background: linear-gradient(90deg, var(--accent) 0%, #a78bfa 50%, var(--accent) 100%);
      background-size: 200%;
      animation: shimmer 1.5s linear infinite;
    }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 800px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      outline: none;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #user-input:focus {
      border-color: var(--accent);
    }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      height: 42px;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }

    .empty-state svg { opacity: 0.3; }
    .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text); }
    .empty-state p { font-size: 13px; text-align: center; max-width: 320px; }
  </style>
</head>
<body>
  <header>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
    <h1>Helm Agent</h1>
    <span class="model-badge" id="model-label">loading…</span>
  </header>
  <div class="status-bar" id="status-bar"></div>
  <div id="messages">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      <h2>Helm Agent</h2>
      <p>Ask me anything about your Helm app — calendar, chat, notifications, or frontend code.</p>
    </div>
  </div>
  <div id="input-area">
    <form id="input-form">
      <textarea
        id="user-input"
        placeholder="Message Helm Agent…"
        rows="1"
        autocomplete="off"
      ></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    const conversationHistory = [];
    let isStreaming = false;
    let msgCounter = 0;

    function uid() {
      return `${Date.now()}-${++msgCounter}-${Math.random().toString(36).slice(2, 7)}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /**
     * Convert plain assistant response text to safe HTML with basic markdown.
     * Only used for assistant messages — user input is always rendered as textContent.
     */
    function renderMarkdown(text) {
      // Escape HTML first to prevent injection, then apply markdown patterns
      const escaped = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return escaped
        .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^---+$/gm, '<hr>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/gs, m => `<ul>${m}</ul>`)
        .replace(/\n/g, '<br>');
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const emptyState  = document.getElementById('empty-state');
    const sendBtn     = document.getElementById('send-btn');
    const inputEl     = document.getElementById('user-input');
    const statusBar   = document.getElementById('status-bar');
    const modelLabel  = document.getElementById('model-label');

    function setStreaming(on) {
      isStreaming = on;
      sendBtn.disabled = on;
      statusBar.classList.toggle('streaming', on);
    }
    function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
    function hideEmptyState() { emptyState.style.display = 'none'; }

    // ── Per-turn rendering state ───────────────────────────────────────────────
    // These are reset at the start of each assistant turn.
    let assistantContainer = null;  // outer .msg.assistant div
    let currentTextBubble  = null;  // active .msg-bubble being streamed into
    let currentBubbleText  = '';    // text buffer for currentTextBubble
    const toolBlocks = {};          // toolCallId → {details, statusEl, bodyEl, resultEl}

    function resetTurnState() {
      assistantContainer = null;
      currentTextBubble  = null;
      currentBubbleText  = '';
      Object.keys(toolBlocks).forEach(k => delete toolBlocks[k]);
    }

    /** Create the outer .msg.assistant container and append to chat. */
    function startAssistantTurn() {
      resetTurnState();
      hideEmptyState();
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = '<div class="msg-role">Helm Agent</div>';
      messagesEl.appendChild(div);
      assistantContainer = div;
      scrollToBottom();
    }

    /**
     * Get (or lazily create) the active text bubble.
     * Called when text-delta arrives — creates a new bubble if none is open,
     * allowing text before and after tool calls to be in separate blocks.
     */
    function getTextBubble() {
      if (!currentTextBubble) {
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        const cur = document.createElement('span');
        cur.className = 'cursor';
        bubble.appendChild(cur);
        assistantContainer.appendChild(bubble);
        currentTextBubble = bubble;
        currentBubbleText = '';
      }
      return currentTextBubble;
    }

    /**
     * Finalize the active text bubble: render markdown, remove streaming cursor.
     * Call this before inserting a thinking block or tool block so that any text
     * that arrived before the block is rendered in its own bubble above it.
     */
    function sealTextBubble() {
      if (!currentTextBubble) return;
      const cur = currentTextBubble.querySelector('.cursor');
      if (cur) cur.remove();
      if (currentBubbleText.trim()) {
        currentTextBubble.innerHTML = renderMarkdown(currentBubbleText);
      } else {
        currentTextBubble.remove();  // empty bubble → drop it
      }
      currentTextBubble = null;
      currentBubbleText = '';
    }

    /** Append a collapsible thinking block. Seals any open text bubble first. */
    function startThinkingBlock() {
      sealTextBubble();
      const block = document.createElement('details');
      block.className = 'thinking-block';
      block.open = true;  // open while streaming
      block.innerHTML = '<summary class="thinking-label">Thinking…</summary><span class="thinking-text"></span>';
      assistantContainer.appendChild(block);
      scrollToBottom();
      return {
        blockEl:   block,
        textEl:    block.querySelector('.thinking-text'),
        summaryEl: block.querySelector('.thinking-label'),
      };
    }

    /**
     * Get or create a collapsible tool-call block.
     * Seals any open text bubble so text before the tool call stays in its own block.
     * Tool blocks open by default so the user can see what was sent.
     */
    function getOrCreateToolBlock(toolCallId, toolName) {
      if (toolBlocks[toolCallId]) return toolBlocks[toolCallId];
      sealTextBubble();

      const details = document.createElement('details');
      details.className = 'tool-block';
      details.open = true;  // visible by default — user can collapse
      details.innerHTML = `
        <summary>
          🔧 <span class="tool-name">${escapeHtml(toolName)}</span>
          <span class="tool-status">calling…</span>
        </summary>
        <div class="tool-body"></div>
        <div class="tool-result" style="display:none"></div>
      `;
      assistantContainer.appendChild(details);
      const tb = {
        details,
        statusEl:  details.querySelector('.tool-status'),
        bodyEl:    details.querySelector('.tool-body'),
        resultEl:  details.querySelector('.tool-result'),
        inputText: '',
      };
      toolBlocks[toolCallId] = tb;
      scrollToBottom();
      return tb;
    }

    // ── Load model info ────────────────────────────────────────────────────────
    fetch('/api/configure')
      .then(r => r.json())
      .then(cfg => {
        const models = cfg.models ?? cfg.Models ?? [];
        modelLabel.textContent = models.length > 0
          ? (models[0].name ?? models[0].id ?? 'connected')
          : 'connected';
      })
      .catch(() => { modelLabel.textContent = 'offline'; });

    // ── Auto-resize textarea ───────────────────────────────────────────────────
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('input-form').requestSubmit();
      }
    });

    // ── Send message ───────────────────────────────────────────────────────────
    document.getElementById('input-form').addEventListener('submit', async e => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text || isStreaming) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      setStreaming(true);

      // Append user bubble
      hideEmptyState();
      const userDiv = document.createElement('div');
      userDiv.className = 'msg user';
      userDiv.innerHTML = '<div class="msg-role">You</div><div class="msg-bubble"></div>';
      userDiv.querySelector('.msg-bubble').textContent = text;
      messagesEl.appendChild(userDiv);
      scrollToBottom();

      const userMsgId = uid();
      conversationHistory.push({ id: userMsgId, role: 'user', parts: [{ type: 'text', text }] });

      // Start assistant turn
      startAssistantTurn();
      const assistantMsgId = uid();

      // Per-turn history tracking
      let allAssistantText = '';  // cumulative text (for conversation history)
      let thinkingEl       = null;
      let thinkingText     = '';
      let reasoningParts   = [];
      let toolCallData     = {};  // callId → {toolName, input, output}

      const messages = conversationHistory.map(m => ({ id: m.id, role: m.role, parts: m.parts }));
      const body = { trigger: 'submit-message', id: uid(), messages };

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);

        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const parts = buffer.split('\n\n');
          buffer = parts.pop() ?? '';

          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith('data:')) continue;
            const jsonStr = line.slice(5).trim();
            if (!jsonStr || jsonStr === '[DONE]') continue;

            let chunk;
            try { chunk = JSON.parse(jsonStr); } catch { continue; }

            const { type } = chunk;

            if (type === 'text-delta') {
              // Lazily create (or reuse) the current text bubble
              const seg = getTextBubble();
              const delta = chunk.delta ?? '';
              allAssistantText  += delta;
              currentBubbleText += delta;
              const cur = seg.querySelector('.cursor');
              seg.textContent = currentBubbleText;
              if (cur) seg.appendChild(cur);
              scrollToBottom();

            } else if (type === 'reasoning-start') {
              thinkingText = '';
              thinkingEl   = startThinkingBlock();

            } else if (type === 'reasoning-delta') {
              if (thinkingEl) {
                thinkingText += chunk.delta ?? '';
                // Fix: use .textEl — thinkingEl is {blockEl, textEl, summaryEl}
                thinkingEl.textEl.textContent = thinkingText;
                scrollToBottom();
              }

            } else if (type === 'reasoning-end') {
              if (thinkingText) reasoningParts.push({ type: 'reasoning', text: thinkingText, state: 'done' });
              if (thinkingEl) {
                thinkingEl.summaryEl.textContent = 'Thought';
                thinkingEl.blockEl.open = false;
              }
              thinkingEl = null;

            } else if (type === 'tool-input-start') {
              getOrCreateToolBlock(chunk.toolCallId ?? uid(), chunk.toolName ?? 'tool');

            } else if (type === 'tool-input-delta') {
              const tb = toolBlocks[chunk.toolCallId];
              if (tb) {
                tb.inputText += chunk.inputTextDelta ?? '';
                tb.bodyEl.textContent = tb.inputText;
              }
            } else if (type === 'tool-input-available') {
              const callId   = chunk.toolCallId;
              const toolName = chunk.toolName ?? 'tool';
              const tb       = getOrCreateToolBlock(callId, toolName);
              try {
                tb.bodyEl.textContent = JSON.stringify(chunk.input, null, 2);
              } catch {
                tb.bodyEl.textContent = String(chunk.input ?? '');
              }
              toolCallData[callId] = { toolName, input: chunk.input ?? null, output: null };
              scrollToBottom();

            } else if (type === 'tool-output-available') {
              const tb = toolBlocks[chunk.toolCallId];
              if (tb) {
                tb.statusEl.textContent   = '✓ done';
                tb.statusEl.className     = 'tool-status done';
                tb.resultEl.style.display = '';
                try {
                  tb.resultEl.textContent = JSON.stringify(chunk.output, null, 2);
                } catch {
                  tb.resultEl.textContent = String(chunk.output ?? '');
                }
                tb.details.open = false;  // auto-collapse when complete
                scrollToBottom();
              }
              const td = toolCallData[chunk.toolCallId];
              if (td) td.output = chunk.output ?? null;

            } else if (type === 'tool-input-error' || type === 'tool-output-error') {
              const tb = toolBlocks[chunk.toolCallId];
              if (tb) {
                tb.statusEl.textContent   = '✗ error';
                tb.statusEl.className     = 'tool-status error';
                tb.resultEl.style.display = '';
                tb.resultEl.textContent   = chunk.error_text ?? chunk.errorText ?? 'Unknown error';
                tb.details.open           = true;
              }

            } else if (type === 'error') {
              throw new Error(chunk.error_text ?? chunk.message ?? JSON.stringify(chunk));
            }
          }
        }

        // ── Finalize turn ────────────────────────────────────────────────────
        // Seal the last text bubble (render markdown, remove cursor)
        sealTextBubble();

        // If nothing at all was rendered, add a fallback placeholder
        if (!assistantContainer.querySelector('.msg-bubble')) {
          const fb = document.createElement('div');
          fb.className = 'msg-bubble';
          fb.textContent = '(no response)';
          assistantContainer.appendChild(fb);
        }

        // Build full parts array for conversation history so subsequent turns
        // receive accurate context: reasoning → tool exchanges → final text
        const completedToolParts = Object.entries(toolCallData)
          .filter(([, d]) => d.output !== null)
          .map(([callId, d]) => ({
            type:       'dynamic-tool',
            toolName:   d.toolName,
            toolCallId: callId,
            state:      'output-available',
            input:      d.input,
            output:     d.output,
          }));
        conversationHistory.push({
          id:    assistantMsgId,
          role:  'assistant',
          parts: [
            ...reasoningParts,
            ...completedToolParts,
            { type: 'text', text: allAssistantText || '(no response)' },
          ],
        });

      } catch (err) {
        sealTextBubble();
        assistantContainer.className = 'msg error';
        const errBubble = document.createElement('div');
        errBubble.className = 'msg-bubble';
        errBubble.textContent = `Error: ${err.message}`;
        assistantContainer.appendChild(errBubble);
      }

      setStreaming(false);
      scrollToBottom();
    });
